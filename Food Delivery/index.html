<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"

    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./media.css" />

    <title>Foodie</title>
  </head>
  <body>
    <!--! header part -->
    <header>
      <nav class="nav-main">
        <a href="#" class="logo">Foodie.</a>

        <ul class="link bar">
          <li class="nav-link">

          </li>
          <li class="nav-link">
            <a href="#">Menu</a>
          </li>
          <li class="nav-link">
            <a href="#">Service</a>
          </li>
          <li class="nav-link">
            <a href="#">About-us</a>
          </li>
          <li class="nav-link">
            <a href="#">Contact-us</a>
          </li>
        </ul>

        <div class="nav-action">
          <a href="#" class="bag">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="cart-value">0</span>
          </a>
          <a href="#" class="sign-btn bar"
            >Sign in
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
          </a>
          <a href="#" class="side-bar" id="side"  >
            <i class="fa-solid fa-bars"></i>
          </a>
        </div>

        <!--*for mobile  -->
        <ul class="mobile-bar" id="mobilebaar">
          <li class="nav-link">
            <a href="#">Home</a>
          </li>
          <li class="nav-link">
            <a href="#">Menu</a>
          </li>
          <li class="nav-link">
            <a href="#">Service</a>
          </li>
          <li class="nav-link">
            <a href="#">About-us</a>
          </li>
          <li class="nav-link">
            <a href="#">Contact-us</a>
          </li>
          <li>
            <a href="#" class="sign-btn"
              >Sign in
              <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- section part -->
    <main>
 <section class="main-front">
  <div class="main-front-contant">
    <div class="main-front-text">
      <div class="main-front-heading">
      <h1>enjoy your delicious <span>food</span> </h1>
      <p>we will fill your tummy with delicious food with fast delivery.</p>
    </div>
    <div class="main-front-btn">
      <a href="#" class="order-btn">Order</a>
      <a href="#" class="social-logo" ><i class="fa-brands fa-x-twitter"></i></a>
      <a href="#" class="social-logo" ><i class="fa-brands fa-instagram"></i></a>
      <a href="#" class="social-logo" ><i class="fa-brands fa-facebook"></i></a>
      <a href="#" class="social-logo" ><i class="fa-brands fa-google-plus-g"></i></a>
    </div>

    </div>

    <div class="main-front-img">
      <div class="main-front-imgae">
        <img src="./Images/delivery-boy.png" alt="boy img" width="80%">
      </div>
    </div>
  </div>
 </section>


    </main>

    <!-- footer part -->

    <footer></footer>

    <script src="./app.js"></script>

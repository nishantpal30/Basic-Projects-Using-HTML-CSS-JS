<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Guess My Number</title>
</head>
<body>
    <div class="main">
    <h1>Guess My Number!</h1>
    
    <div class="number-generate">?</div>

    <h2 class="first-score">Initial Score: <span>0</span></h2>
   <h3 class="highest-score">Highsest score: <span>0</span></h3>

   <div class="game-start">
    <h5 class="game-starting">Start guesssing......</h5>
   </div>

   <p>( Between 1 and 20 )</p>
   <div class="input-number">
    <input type="text" class="inputarea">
    
   </div>
<div class="btn">
   <button class="Checkbtn">Check!</button>
   <button class="trybtn">Try Again!</button>
</div>
</div>

    <script src="./app.js"></script>
</body>
</html>

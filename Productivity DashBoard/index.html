<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    
    <title>Productivity Dashboard</title>
</head>
<body>
    
<main>
    <section class="allelems">
        <div class="todo elem" id="todo1">
            <img src="./Images/todolist.png" alt="to-do-list">
            <button class="cardbtn"  id="0">To do list</button>
        </div>

          <div class="daily elem" id="daily1">
            <img src="./Images/Daily Pmanner.png" alt="Daily Planner">
           <button class="cardbtn" id="1"> Daily Planner </button>
        </div>

          <div class="motiv elem" id="motiv1">
            <img src="./Images/Motivation.png" alt="Motivation">
            <button class="cardbtn" id="2"> Motivation</button>
        </div>

          <div class="pomodorom elem" id="pomo1">
            <img src="./Images/Promotimer.png" alt="Timer">
            <button class="cardbtn" id="3"> Pomodoro Timer</button>
        </div>

          <div class="goal elem" id="goal1">
            <img src="./Images/Daily Pmanner.png" alt="Daily Goals">
             <button  class="cardbtn" id="4">Daily Goals</button>
        </div>

    </section>


    <section class="cont-elems todo-elems">
        to do list
    </section>

<section class="cont-elems daily-elem">
        daily
    </section>

    <section class="cont-elems moti-elems">
        motivation
    </section>

    <section class="cont-elems promo-elems">
        timer
    </section>

    <section class="cont-elems goal-elems">
        daily goals
    </section>

</main>

    <script src="./app.js"></script>
</body>
</html>
